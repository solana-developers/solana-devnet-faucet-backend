name: Deploy to App Engine

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploying to Google App Engine
    runs-on: ubuntu-latest
    # Required so the final step can push a deploy tag back to the repo.
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install Dependencies
        run: npm ci

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          credentials_json: ${{ secrets.GCP_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure gcloud CLI
        run: |-
          gcloud config set account ${{ secrets.SERVICE_ACCOUNT }}
          gcloud config set project ${{ secrets.PROJECT_ID }}

      - name: Replace app.yml secrets
        uses: 73h/gae-app-yaml-replace-env-variables@v0.1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_TOKENS: ${{ secrets.GH_TOKENS }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          DB_USER: ${{ secrets.DB_USER}}
          DB_NAME: ${{ secrets.DB_NAME}}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD}}
          DB_CONNECTION_NAME: ${{ secrets.DB_CONNECTION_NAME}}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'warn' }}
        with:
          app_yaml_path: app.yaml

      - name: Deploy to App Engine
        uses: google-github-actions/deploy-appengine@v2
        with:
          deliverables: app.yaml

      # Tag the deployed commit so we can answer "what shipped when" from git
      # without grepping CI logs. Lightweight tag — points to ${{ github.sha }}.
      - name: Tag deployed commit
        run: |
          TAG="deploy-$(date -u +%Y%m%d-%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG"